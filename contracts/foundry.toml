[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
coston2 = "${COSTON2_RPC_URL}"

[etherscan]
coston2 = { key = "${COSTON2_EXPLORER_API_KEY}", chain = 114, url = "https://coston2-explorer.flare.network/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
